<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista Detallada de Tarea</title>
    <style>
        body {
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .task-card {
            background-color: #000000;
            border: 1px solid #222222;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            max-width: 700px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* Contenedor Grid para alinear todo perfectamente */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px 40px;
        }

        .card-column {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Ocupa las dos columnas para datos largos */
        .full-width {
            grid-column: span 2;
        }

        /* Separador sutil entre bloques de información */
        .divider {
            height: 1px;
            background-color: #222222;
            margin: 4px 0;
        }

        .column-label {
            color: #888888;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .column-value {
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            line-height: 1.4;
        }

        .column-value.email {
            color: #4da3ff;
            text-decoration: none;
            font-weight: 500;
        }

        .column-value.email:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="task-card">
        
        <div class="info-grid">
            <!-- Sección: Cliente (Prioridad Visual) -->
            <div class="card-column full-width">
                <span class="column-label">Cliente</span>
                <span class="column-value" style="font-size: 18px; font-weight: 600;">TEXTCLIENTE</span>
            </div>
            
            <div class="card-column">
                <span class="column-label">Dirigido a</span>
                <span class="column-value">TEXTDIRIGIDO</span>
            </div>

            <div class="card-column">
                <span class="column-label">Email</span>
                <a href="mailto:andresfsc234@gmail.com" class="column-value email">TEXTEMAIL</a>
            </div>
        </div>

        <div class="divider"></div>

        <div class="info-grid">
            <!-- Sección: Detalles del Servicio -->
            <div class="card-column">
                <span class="column-label">Tarea Designada</span>
                <span class="column-value">TEXTTAREA</span>
            </div>
            
            <div class="card-column">
                <span class="column-label">Fecha de asignación</span>
                <span class="column-value">TEXTFECHA</span>
            </div>

            <div class="card-column full-width">
                <span class="column-label">Observación</span>
                <span class="column-value" style="color: #cccccc; font-weight: 400;">TEXTOBSERVACIÓN</span>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Sección: Auditoría / Control -->
        <div class="info-grid">
            <div class="card-column full-width">
                <span class="column-label">Creado por</span>
                <span class="column-value" style="font-size: 14px; color: #aaaaaa;">TEXTCREADO</span>
            </div>
        </div>

    </div>

</body>
</html>
