<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: letter landscape; margin: 8mm; background-color: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Arial', sans-serif; background-color: #ffffff; color: #000; }
        .header { margin-bottom: 3mm; border-bottom: 1.5px solid #000; padding-bottom: 3px; }
        .header-top { display: table; width: 100%; }
        .header-left { display: table-cell; font-size: 9pt; font-weight: bold; color: #2c3e50; }
        .logo-img { height: auto; width: 25%; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div class="header-left">
                <img src="https://storage.googleapis.com/glide-prod.appspot.com/uploads-v2/GgV6wspbUz4JCNwiNEfC/pub/w4etD8MVAcYoDgmA5Trn.png" alt="Logo" class="logo-img">
            </div>
        </div>
    </div>
</body>
</html>
