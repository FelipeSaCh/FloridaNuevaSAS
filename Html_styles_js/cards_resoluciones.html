<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjeta Moderna</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:transparent;
    font-family:'Inter',sans-serif;

    
}
/* ───────── CARD ───────── */
.card{
    background:#151515;
    border-radius:18px;
    padding:18px;
    box-sizing:border-box;
    color:#ffffff;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    width:100%;
    height:100%;
    min-height:100vh;
}

/* ───────── HEADER ───────── */
.card-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
}

.card-header h2{
    margin:0;
    font-size:20px;
    line-height:1.15;
    font-weight:800;
    color:#ffffff;
    letter-spacing:-0.5px;
    word-break:break-word;
}

.status-badge{
    background:#16351f;
    color:#4ade80;
    padding:6px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
    white-space:nowrap;
}

/* ───────── GRID INFO ───────── */
.info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px 12px;
}

.info-item{
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:0;
}

.info-item.full{
    grid-column:1 / -1;
}

.info-item label{
    font-size:11px;
    color:#6b7280;
    text-transform:uppercase;
    font-weight:600;
    letter-spacing:0.5px;
}

.info-item span{
    font-size:15px;
    font-weight:700;
    color:#f9fafb;
    line-height:1.2;
    word-break:break-word;
}

/* ───────── DÍAS ───────── */
.days-card{
    background:linear-gradient(
        135deg,
        rgba(239,68,68,0.15),
        rgba(239,68,68,0.05)
    );

    border:1px solid rgba(239,68,68,0.25);
    border-radius:16px;

    padding:18px;
    margin-bottom:18px;
    
}



.days-card small{
    display:block;
    color:#fca5a5;
    margin-bottom:2px;
    font-size:12px;
    font-weight:600;
}

.days-card strong{
    font-size:42px;
    line-height:1;
    color:#ef4444;
    font-weight:800;
    letter-spacing:-2px;
    animation: textPulse 2.5s infinite ease-in-out;
    margin-bottom:2px;
}

@keyframes textPulse {
    0%, 100% {
        text-shadow: 0 0 0px rgba(239, 68, 68, 0);
        filter: brightness(1);
    }
    50% {
        text-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        filter: brightness(1.2); /* Hace que el rojo se vea más vivo */
    }
}
/* ───────── FOOTER ───────── */
.footer{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding-top:6px;
    border-top:1px solid #242424;
}

.footer span{
    color:#6b7280;
    font-size:12px;
    font-weight:500;
}

.badge{
    background:#1e3a5f;
    color:#60a5fa;

    padding:6px 12px;
    border-radius:999px;

    font-size:12px;
    font-weight:700;

    white-space:nowrap;
}
</style>
</head>

<body>

<div class="card">

    <!-- HEADER -->
    <div class="card-header">

        <h2>
            TEXTNOMBRE
        </h2>


    </div>

    <!-- INFO -->
    <div class="info-grid">

        <div class="info-item full">
            <label>N° de Resolución</label>
            <span>TEXTRESOLUCION</span>
        </div>

        <div class="info-item">
            <label>NIT</label>
            <span>TEXTNIT</span>
        </div>

        <div class="info-item">
            <label>Prefijo</label>
            <span>TEXT_PREFIJO</span>
        </div>

        <div class="info-item full">
            <label>Tipo</label>
            <span>TEXTTIPO</span>
        </div>

        <div class="info-item full">
            <label>Factura</label>
            <span>TEXTFACTURA</span>
        </div>

        <div class="info-item full">
            <label>Fecha de Resolucion</label>
            <span>TEXTFECHA_RESOLUCION</span>
        </div>

        <div class="info-item full">
            <label>Fecha de fin de Resolucion</label>
            <span>TEXTFECHA_FIN_RESOLUCION</span>
        </div>


    </div>

    <!-- DIAS -->
    <div class="days-card">

        <small>Días Pendientes</small>

        <strong>
            TEXT_DIAS_PENDIENTES
        </strong>
         
        <small>Meses</small>
        <strong>
            TEXTMESES
        </strong>

    </div>

    <!-- FOOTER -->
    <div class="footer">

        <span>
            Responsable
        </span>

        <div class="badge">
            TEXT_RESPONSABLE
        </div>

    </div>

</div>

</body>
</html>
