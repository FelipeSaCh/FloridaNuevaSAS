<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjeta Moderna</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:transparent;
    font-family:'Inter',sans-serif;
}

/* ───────── CARD (CON ANIMACIÓN DE ENTRADA) ───────── */
.card{
    background:#151515;
    border-radius:18px;
    padding:18px;
    box-sizing:border-box;
    color:#ffffff;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    width:100%;
    height:100%;
    min-height:100vh;
    
    /* Estado inicial y animación del contenedor principal */
    opacity: 0;
    animation: cardRender 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* ───────── HEADER ───────── */
.card-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    
    opacity: 0;
    animation: elementoRender 0.4s ease-out 0.15s forwards;
}

.card-header h2{
    margin:0;
    font-size:20px;
    line-height:1.15;
    font-weight:800;
    color:#ffffff;
    letter-spacing:-0.5px;
    word-break:break-word;
}

.status-badge{
    background:#16351f;
    color:#4ade80;
    padding:6px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
    white-space:nowrap;
}

/* ───────── GRID INFO (CON EFECTO CASCADA SUTIL) ───────── */
.info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px 12px;
    margin-top: 16px;
    margin-bottom: 20px;
}

.info-item{
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:0;
    
    opacity: 0;
    animation: elementoRender 0.4s ease-out forwards;
}

/* Retrasos escalonados para que la info aparezca de arriba a abajo */
.info-grid .info-item:nth-child(1) { animation-delay: 0.20s; }
.info-grid .info-item:nth-child(2) { animation-delay: 0.24s; }
.info-grid .info-item:nth-child(3) { animation-delay: 0.28s; }
.info-grid .info-item:nth-child(4) { animation-delay: 0.32s; }
.info-grid .info-item:nth-child(5) { animation-delay: 0.36s; }
.info-grid .info-item:nth-child(6) { animation-delay: 0.40s; }
.info-grid .info-item:nth-child(7) { animation-delay: 0.44s; }

.info-item.full{
    grid-column:1 / -1;
}

.info-item label{
    font-size:11px;
    color:#6b7280;
    text-transform:uppercase;
    font-weight:600;
    letter-spacing:0.5px;
}

.info-item span{
    font-size:15px;
    font-weight:700;
    color:#f9fafb;
    line-height:1.2;
    word-break:break-word;
}

/* ───────── DÍAS (ANIMACIÓN ENTRADA + PULSO) ───────── */
.days-card{
    background:linear-gradient(
        135deg,
        rgba(239,68,68,0.15),
        rgba(239,68,68,0.05)
    );

    border:1px solid rgba(239,68,68,0.25);
    border-radius:16px;

    padding:18px;
    margin-bottom:18px;
    
    opacity: 0;
    /* Aparece un poco después de la info básica */
    animation: elementoRender 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.48s forwards;
}

.days-card small{
    display:block;
    color:#fca5a5;
    margin-bottom:2px;
    font-size:12px;
    font-weight:600;
}

.days-card strong{
    display: block;
    font-size:42px;
    line-height:1;
    color:#ef4444;
    font-weight:800;
    letter-spacing:-2px;
    margin-bottom:2px;
    /* Mantiene tu animación original de pulso continuo */
    animation: textPulse 2.5s infinite ease-in-out; 
}

@keyframes textPulse {
    0%, 100% {
        text-shadow: 0 0 0px rgba(239, 68, 68, 0);
        filter: brightness(1);
    }
    50% {
        text-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        filter: brightness(1.2);
    }
}

/* ───────── FOOTER ───────── */
.footer{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding-top:12px;
    border-top:1px solid #242424;
    
    opacity: 0;
    animation: elementoRender 0.4s ease-out 0.55s forwards;
}

.footer span{
    color:#6b7280;
    font-size:12px;
    font-weight:500;
}

.badge{
    background:#1e3a5f;
    color:#60a5fa;

    padding:6px 12px;
    border-radius:999px;

    font-size:12px;
    font-weight:700;

    white-space:nowrap;
}

/* ==========================================
   KEYFRAMES PARA EL RENDERIZADO INICIAL
   ========================================== */
@keyframes cardRender {
    from {
        opacity: 0;
        transform: scale(0.96);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

@keyframes elementoRender {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="card-header">
        <h2>
            TEXTNOMBRE
        </h2>
    </div>

    <div class="info-grid">

        <div class="info-item full">
            <label>N° de Resolución</label>
            <span>TEXTRESOLUCION</span>
        </div>

        <div class="info-item">
            <label>NIT</label>
            <span>TEXTNIT</span>
        </div>

        <div class="info-item">
            <label>Prefijo</label>
            <span>TEXT_PREFIJO</span>
        </div>

        <div class="info-item full">
            <label>Tipo</label>
            <span>TEXTTIPO</span>
        </div>

        <div class="info-item full">
            <label>Factura</label>
            <span>TEXTFACTURA</span>
        </div>

        <div class="info-item full">
            <label>Fecha de Resolucion</label>
            <span>TEXTFECHA_RESOLUCION</span>
        </div>

        <div class="info-item full">
            <label>Fecha de fin de Resolucion</label>
            <span>TEXTFECHA_FIN_RESOLUCION</span>
        </div>

    </div>

    <div class="days-card">
        <small>Días Pendientes</small>
        <strong>
            TEXT_DIAS_PENDIENTES
        </strong>
    </div>

    <div class="footer">
        <span>
            Responsable
        </span>
        <div class="badge">
            TEXT_RESPONSABLE
        </div>
    </div>

</div>

</body>
</html>
