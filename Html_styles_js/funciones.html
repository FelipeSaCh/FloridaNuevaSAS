<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acta No. 74 – Reunión Administrativa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #d0d0d0;
      display: flex;
      justify-content: center;
      padding: 30px 0;
      font-family: Arial, sans-serif;
      font-size: 18pt;
    }

    .carta {
      width: 816px;
      min-height: 1056px;
      background: #fff;
      padding: 60px 70px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      
      /* Animación suave de entrada para toda la hoja */
      animation: cartaEntrada 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    table.encabezado {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 0;
    }

    table.encabezado tr {
      /* Efecto cascada inicial para las filas del encabezado */
      opacity: 0;
      animation: elementoEntrada 0.4s ease-out forwards;
    }
    table.encabezado tr:nth-child(1) { animation-delay: 0.1s; }
    table.encabezado tr:nth-child(2) { animation-delay: 0.18s; }
    table.encabezado tr:nth-child(3) { animation-delay: 0.26s; }
    table.encabezado tr:nth-child(4) { animation-delay: 0.34s; }

    table.encabezado td {
      border: 1px solid #000;
      padding: 6px 10px;
      vertical-align: middle;
    }

    .celda-proceso {
      font-weight: bold;
      font-size: 12pt;
      width: 160px;
    }

    .celda-valor {
      font-size: 12pt;
    }

    .celda-label {
      font-weight: bold;
      font-size: 12pt;
      background: #f2f2f2;
      width: 130px;
    }

    table.cuerpo {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0;
    }

    /* Animación para las secciones de la tabla de contenido */
    table.cuerpo tr {
      opacity: 0;
      animation: elementoEntrada 0.5s ease-out forwards;
    }
    table.cuerpo tr:nth-child(1) { animation-delay: 0.42s; } /* Título actividades */
    table.cuerpo tr:nth-child(2) { animation-delay: 0.50s; } /* Subtítulo funciones */
    table.cuerpo tr:nth-child(3) { animation-delay: 0.58s; } /* Bloque de ítems descritos */

    table.cuerpo td {
      border: 1px solid #000;
      padding: 6px 10px;
      vertical-align: top;
    }

    .titulo-seccion {
      font-weight: bold;
      font-size: 12pt;
      background: #f2f2f2;
      text-align: center;
    }

    .subtitulo-seccion {
      font-weight: bold;
      font-size: 12pt;
    }

    .item {
      margin-bottom: 6px;
      font-size: 12pt;
    }

    /* ==========================================
       KEYFRAMES PARA LAS ANIMACIONES EN PANTALLA
       ========================================== */
    @keyframes cartaEntrada {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes elementoEntrada {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ==========================================
       ESTILOS OPTIMIZADOS PARA IMPRESIÓN / PDF
       (Se anulan las animaciones para evitar bugs)
       ========================================== */
    @media print {
      @page {
        margin: 0;
      }
      body { 
        background: none; 
        padding: 0; 
        margin: 0;
      }
      .carta { 
        box-shadow: none;
        width: 100%;
        min-height: 0;
        height: auto;
        padding: 40px 50px;
        animation: none !important; /* Quita animación al imprimir */
        transform: none !important;
      }
      table.encabezado tr, table.cuerpo tr {
        opacity: 1 !important;     /* Asegura visibilidad total en impresión */
        animation: none !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>
<div class="carta">

  <table class="encabezado">
    <tr>
      <td class="celda-proceso">NOMBRE DEL PROCESO</td>
      <td class="celda-valor" colspan="3">REUNIÓN ADMINISTRATIVA</td>
    </tr>
    <tr>
      <td class="celda-label">OBJETIVO:</td>
      <td class="celda-valor" colspan="3">Análisis de funciones y entrega de cargos del equipo de trabajo</td>
    </tr>
    <tr>
      <td class="celda-label">FECHA:</td>
      <td class="celda-valor">TEXTDATE</td>
      <td class="celda-label">NÚMERO DE ACTA:</td>
      <td class="celda-valor">TEXTACTNUMBER</td>
    </tr>
    <tr>
      <td class="celda-label">ASISTENTES</td>
      <td class="celda-valor" colspan="3">TEXTQUIENREALIZA</td>
    </tr>
  </table>

  <table class="cuerpo">
    <tr>
      <td class="titulo-seccion">ACTIVIDADES REALIZADAS</td>
    </tr>
    <tr>
      <td class="subtitulo-seccion">FUNCIONES</td>
    </tr>
    <tr>
      <td>
        <p class="item">-REALIZADO</p>
      </td>
    </tr>
  </table>

</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const items = document.querySelectorAll('.item');

    items.forEach(item => {
      let textoOriginal = item.innerText.trim();

      const patronSeparadores = /\s+(?=[-•*])/g;
      let lineas = textoOriginal.split(patronSeparadores);

      let lineasLimpias = lineas
        .map(linea => linea.trim())
        .filter(linea => linea.length > 0);

      // Aquí integramos un efecto de animación también para las líneas dinámicas separadas por JS
      item.innerHTML = lineasLimpias
        .map((linea, index) => {
          // Generamos un pequeño retraso (delay) dinámico por cada línea separada
          let delay = 0.6 + (index * 0.08); 
          return `<div style="margin-bottom: 14px; line-height: 1.4; text-align: left; opacity: 0; animation: elementoEntrada 0.4s ease-out ${delay}s forwards;">${linea}</div>`;
        })
        .join('');
    });
  });
</script>

</body>
</html>
